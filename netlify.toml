[build]
  publish = "."

# ─── Cabeçalhos globais ─────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ─── Cache longo para fontes ────────────────────────────
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache longo para assets ────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache moderado para CSS ────────────────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ─── PDFs servidos como download ────────────────────────
[[headers]]
  for = "/pdfs/*"
  [headers.values]
    Content-Disposition = "attachment"

# ─── SPA-style fallback para a home ─────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
